<!DOCTYPE html>
<html>
<head>
    <title>Community</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e8f5e9, #ffffff);
    padding: 20px;
}
h2 {
    text-align: center;
    color: #2e7d32;
    margin-bottom: 20px;
}

/* Post Box */
.post-box {
    width: 450px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Textarea */
textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    resize: none;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: linear-gradient(to right, #4CAF50, #2e7d32);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Posts Section */
.posts {
    width: 450px;
    margin: 25px auto;
}

/* Each Post */
.post {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    position: relative;
    transition: 0.3s;
}

/* Hover effect */
.post:hover {
    transform: scale(1.02);
}

/* Left Accent Line */
.post::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 5px;
    background: linear-gradient(#4CAF50, #81C784);
    border-radius: 12px 0 0 12px;
}
</style>

<body>

<h2> 🌸Community Page</h2>

<div class="post-box">
    <form action="/add_post" method="post">
        <textarea name="content" placeholder="Share something..."></textarea>
        <button type="submit">Post</button>
    </form>
</div>

<div class="posts">
    {% for post in posts %}
        <div class="post">
            {{ post[1] }}
        </div>
    {% endfor %}
</div>

</body>
