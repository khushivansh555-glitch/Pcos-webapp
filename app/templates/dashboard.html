<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f7fb;
        }

        /* Navbar */
        .navbar {
            background: #4CAF50;
            padding: 15px;
            color: white;
            text-align: center;
            font-size: 20px;
        }

        .nav-links {
            text-align: center;
            margin-top: 10px;
        }

        .nav-links a {
            margin: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        /* Main container */
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        /* Cards */
        .card {
            width: 220px;
            height: 150px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #e8f5e9;
        }

        a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    PCOS Health Dashboard
    <div class="nav-links">
        <a href="/dashboard">Home</a>
        <a href="/symptom">Symptom</a>
        <a href="/tracker">Tracker</a>
        <a href="/community">Community</a>
    </div>
</div>
